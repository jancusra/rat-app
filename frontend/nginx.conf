server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse-proxy the API so frontend and backend share one origin (no CORS).
    # Keeps the /api prefix (no trailing slash on proxy_pass) since backend routes
    # are /api/... . Only this port needs to be reachable on the LAN.
    location /api/ {
        proxy_pass http://backend:47050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Serve the SPA: fall back to index.html so client-side routes work.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
