services:
  # SQL Server database. All connection values come from the central .env file.
  db:
    image: mcr.microsoft.com/mssql/server:2022-CU25-ubuntu-22.04
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "${DB_PASSWORD}"
      MSSQL_TCP_PORT: "${DB_PORT}"
    ports:
      - "${DB_PORT}:${DB_PORT}"
    volumes:
      - mssql-data:/var/opt/mssql

  # One-shot: wait for SQL Server, then create the database
  # (FluentMigrator migrates an existing database; it does not create one).
  db-init:
    image: mcr.microsoft.com/mssql/server:2022-CU25-ubuntu-22.04
    depends_on:
      - db
    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"
    entrypoint:
      - bash
      - -c
      - |
        for i in $(seq 1 60); do
          /opt/mssql-tools18/bin/sqlcmd -C -S "$$DB_HOST,$$DB_PORT" -U "$$DB_USER" -P "$$DB_PASSWORD" -Q "SELECT 1" && break;
          echo "waiting for sql server... ($$i)"; sleep 2;
        done;
        /opt/mssql-tools18/bin/sqlcmd -C -S "$$DB_HOST,$$DB_PORT" -U "$$DB_USER" -P "$$DB_PASSWORD" -Q "IF DB_ID(N'$$DB_NAME') IS NULL CREATE DATABASE [$$DB_NAME];"

  # .NET 8 API — runs code-first migrations on startup, then serves on :47050.
  # The connection string is assembled from the central .env values and written
  # to App_Data/databaseSettings.json by the container entrypoint (no password
  # is stored in any committed file). Becomes "healthy" only after MigrateUp()
  # completes, so other services can use that as the "schema is ready" signal.
  backend:
    build: ./backend
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:47050
      DB_PROVIDER: "sqlserver"
      DB_CONNECTION_STRING: "Data Source=${DB_HOST},${DB_PORT};Initial Catalog=${DB_NAME};User ID=${DB_USER};Password=${DB_PASSWORD};TrustServerCertificate=true"
      # JWT signing key from the central .env (overrides JWT:SecretKey in appsettings).
      # ASP.NET Core maps the "__" separator to the "JWT:SecretKey" config path.
      JWT__SecretKey: "${JWT_SECRET_KEY}"
    ports:
      - "47050:47050"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:47050/api/home/"]
      interval: 5s
      timeout: 5s
      retries: 30
      start_period: 15s

  # React app built and served as static files by nginx
  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

  # Loads seed data (languages, localizations, admin user, roles, menu) from
  # init_db.sql once the backend is healthy (schema fully migrated). Idempotent:
  # skips if data already exists, so re-running "compose up" is safe.
  db-seed:
    image: mcr.microsoft.com/mssql/server:2022-CU25-ubuntu-22.04
    depends_on:
      backend:
        condition: service_healthy
    environment:
      DB_HOST: "${DB_HOST}"
      DB_PORT: "${DB_PORT}"
      DB_USER: "${DB_USER}"
      DB_PASSWORD: "${DB_PASSWORD}"
      DB_NAME: "${DB_NAME}"
    volumes:
      - ./backend/db:/db:ro
    entrypoint:
      - bash
      - -c
      - |
        set -ef
        SQLCMD="/opt/mssql-tools18/bin/sqlcmd -C -S $$DB_HOST,$$DB_PORT -U $$DB_USER -P $$DB_PASSWORD -d $$DB_NAME"
        existing=$$($$SQLCMD -h -1 -W -Q "SET NOCOUNT ON; SELECT COUNT(*) FROM [dbo].[Language]")
        existing=$${existing//[!0-9]/}
        if [ "$$existing" = "0" ]; then
          echo "Schema is ready - seeding init_db.sql ...";
          $$SQLCMD -b -i /db/init_db.sql;
          echo "Seed complete.";
        else
          echo "Data already present (Language = $$existing rows). Skipping seed.";
        fi

volumes:
  mssql-data:
